syntax = "proto3";
package Game;
option csharp_namespace = "GameProto";

// ============== 信封：所有网络消息都包在这里 ============

message NetMessage{
	oneof msg{

		// 底层系统
		HeartBeat 	  heartbeat				  = 1;
		KickOff		  	kick_off				  = 2;

		// 房间
		CreateRoom 	  create_room   		= 10;
		CreateRoomAck create_room_ack		= 11;
		JoinRoom 	  	join_room 				= 12;
		JoinRoomAck	  join_room_ack			= 13;
		PlayerList	  player_list				= 14;
		StartGame	  	start_game				= 15;
		GameStart	  	game_start				= 16;
		PlayerInfo		player_info				= 17;
		RequestPlayerList request_player_list = 18;
		ReturnToRoom	return_to_room			= 19;

		// 帧同步
		InputTick	    input_tick				= 20;
		PlayerInput   player_input			= 21;

		// 游戏事件
		CrystalSpawn  	crystal_spawn			= 30;
		CrystalPickup 	crystal_pickup		= 31;
		PlayerHit 	  	player_hit				= 32;
		PlayerFall	  	player_fall				= 33;
		GameEnd		  		game_end					= 34;
		PlayerRespawn  	player_respawn  	= 35;
		GameTimerUpdate game_timer_update	= 36;
		PlayerOffline   player_offline    = 37;
		PhaseSwitch     phase_switch      = 38;
		CrystalDrop     crystal_drop      = 39;

		// 重连
		Reconnect 	  reconnect 				= 40;
		ReconnectAck  reconnect_ack			= 41;
		CatchUpTicks  catch_up_ticks	  = 42;

	}
}

// ============== 底层系统消息 ============

// 1
message HeartBeat {
  int64 time = 1;
}

// 2
message KickOff {
  string reason = 1;
}

// ============== 房间消息 ============

// 10
message CreateRoom{
	string host_name 	= 1;
}

// 11
message CreateRoomAck{
	bool   	success 	= 1;
	string  room_id		= 2;
	int32  	player_id	= 3;
	string 	error 		= 4;
}

// 12
message JoinRoom{
	string  room_id 		= 1;
	string 	player_name = 2;
}

// 13
message JoinRoomAck{
	bool   success 		= 1;
	int32  player_id 	= 2;
	string error 			= 3;
	string room_id 		= 4;
	repeated PlayerInfo players = 5;
}

// 17
message PlayerInfo{
	int32  player_id 		= 1;
	string player_name 	= 2;
	bool   is_host	   	= 3;
}

// 14
message PlayerList{
	repeated PlayerInfo players = 1;
}

// 18 客户端请求刷新玩家列表
message RequestPlayerList{
	// 空消息，就是一个信号
}

// 19 客户端通知服务器已从游戏返回房间
message ReturnToRoom{
	int32 player_id = 1;
}

// 15 房主开始游戏
message StartGame{
	// 房主发的 无字段 就是一个信号
}

// 16 游戏正式开始
message GameStart{
	int32 random_seed		= 1;
	int32 player_count 	= 2;
	float game_duration	= 3;	// 秒
	int32 target_score	= 4;
	int32 tick_rate			= 5;	// 20
}

// ============== 帧同步消息 ============

// 21
// 一个玩家在一帧里输入
message PlayerInput{
	int32  player_id		= 1;
	int32  tick 				= 2;
	uint32 move_dir			= 3;	// 4bit： bit0 = W | bit1 = S | bit2 = A | bit3 = D
	bool   jump	        = 8;  // 是否跳了
	bool   attack				= 4;	// 左键点击（这一tick按下）
	bool   skill				= 5;	// 右键松开（蓄力释放 仅松开那一tick为true）
	sfixed64 camera_yaw		= 6;	// 摄像机水平角度（度） 决定WASD的前方
	sfixed64 charge_time	= 7;	// 右键蓄力时长（秒） skill = true 时有效
	// Phase 2: 服务端权威位置（执行完上一 tick 后的位置，用于客户端校正）
	sfixed64 result_pos_x = 9;
	sfixed64 result_pos_y = 10;
	sfixed64 result_pos_z = 11;
	sfixed64 camera_pitch = 12;	// 摄像机垂直角度（弧度, Fix64.Raw），用于箭矢方向计算

}

// 20
// Host广播： 一帧所有玩家的输入
message InputTick{
	int32 				 			 tick 	 = 1;
	repeated PlayerInput inputs	 = 2;
}

// 客户端发给Host的单帧输入
//（直接用PlayerInput 不用再包一层）

// ============== 游戏事件 ============

// 30
message CrystalSpawn{
	int32 crystal_id = 1;
	sfixed64 pos_x		 	 = 2;
	sfixed64 pos_y		   = 3;
	sfixed64 pos_z 	   = 4;
}

// 31
message CrystalPickup{
	int32 crystal_id	= 1;
	int32 player_id		= 2;
	int32 new_score		= 3;
}

// 32
message PlayerHit{
	int32 attacker_id		= 1;
	int32 victim_id			= 2;
	int32 dropped_count = 3;		// 掉了几颗晶石（保留兼容，死亡时由服务端填）
	int32 damage        = 4;		// ★ 本次伤害值
	int32 new_hp        = 5;		// ★ 受击后受害者的 HP
}

// 33
message PlayerFall{
	int32 player_id 		= 1;
	int32 dropped_count = 2;		// 掉了全部晶石数
}

// 35
message PlayerRespawn {
	int32  player_id = 1;
	sfixed64  pos_x     = 2;  // 复活点位置
	sfixed64  pos_y     = 3;
	sfixed64  pos_z     = 4;
}

// 34
message GameEnd{
	repeated int32 scores 	 = 1;	// index = player_id
	int32 		   	 winner_id = 2;
	string				 winner_name = 3;
}

// 36 游戏倒计时同步（房主定期广播）
message GameTimerUpdate{
	float remaining_time = 1;	// 剩余时间（秒）
}

// 37 服务器通知：某玩家心跳超时离线
message PlayerOffline{
	int32  player_id   = 1;
	string player_name = 2;
}

// 38 阶段切换广播
message PhaseSwitch{
	int32 phase_type = 1;	// 0=准备, 1=生成, 2=攻击, 3=结束
	int32 round      = 2;	// 当前轮次（0=准备, 1/2/3）
	float remaining  = 3;	// 游戏剩余秒数
}

// 39 死亡掉落水晶
message CrystalDrop{
	int32 count      = 1;	// 掉落数量
	int32 player_id  = 2;	// 死亡玩家ID
	int32 new_score  = 3;	// 死亡后玩家新分数
}

// ============== 短线重连 ============

// 40
message Reconnect{
	int32 player_id = 1;				// 我的玩家ID（证明身份）
	int32 last_tick = 2;				// 客户端最后收到的tick
}

// 41
message ReconnectAck{
	bool  success							= 1; // 重连是否成功
	int32 catch_up_from 			= 2; // 你从【这一帧】开始补数据
	int32 current_server_tick = 3; // 服务端当前最新帧
}

// 42
message CatchUpTicks{
	int32 							from_tick = 1;	// 从哪一帧开始
	int32 							to_tick	  = 2;	// 到哪一帧结束
	repeated InputTick 	ticks     = 3;	// 这段时间所有玩家的输入帧
}
